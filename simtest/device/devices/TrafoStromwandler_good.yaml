name: TrafoStromwandler_good

signals:
  inputs: [GND, VCC_GND, VT_INPUT, HELPER_SUPPLY]
  outputs: [VT_OUTPUT, LOAD_CURRENT]
  sources: [SUPPLY]
  internal: []

initial_inputs:
  GND: 0.0
  VCC_GND: 0.0
  VT_INPUT: 0.0
  HELPER_SUPPLY: 0.0

initial_sources:
  SUPPLY: 0.0

source_control:
  minimums:
    SUPPLY: 19.5

outputs:
  VT_OUTPUT:
    default: 0.0
    transfer_curve:
      input: VT_INPUT
      mode: linear
      points:
        - x: 0.0
          y: 0.0
        - x: 2.0
          y: 2.0

  LOAD_CURRENT:
    default: 0.0
    rules:
      - when:
          input: VT_INPUT
          gte: 1.95
        value: 2.0
