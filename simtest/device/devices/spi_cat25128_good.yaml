name: spi_cat25128_good

signals:
  inputs:
    - SPI_board1.CS
    - SPI_board1.CLK
    - SPI_board1.MOSI
    - SPI_board1.MISO
    - SPI_board1.VCC
    - SPI_board1.GND

interfaces:
  SPI_interface1:
    protocol: spi
    required_supply_v: 5.0
    frequency_hz: 10000
    clock_phase: Falling edge
    clock_polarity: High
    chip_select_active: Low
    devices:
      CAT25128:
        kind: cat25128
        size_bytes: 256
        address_width_bytes: 2
        page_size: 64
        write_delay_ms: 10
        default_read_byte: 0xFF
        status_register: 0x00
        initial_memory_hex: 
  SPI2:
    protocol: spi
    required_supply_v: 5.0
    frequency_hz: 10000
    clock_phase: Rising edge
    clock_polarity: High
    chip_select_active: Low
    devices:
      CAT25128:
        kind: cat25128
        size_bytes: 256
        address_width_bytes: 2
        page_size: 64
        write_delay_ms: 10
        default_read_byte: 0xFF
        status_register: 0x00
        initial_memory_hex: 
