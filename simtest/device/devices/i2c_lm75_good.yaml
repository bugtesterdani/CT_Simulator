    required_supply_v: 5.0
    master_readback: echo
    devices:
      LM75:
        kind: lm75
        address: 0x49
        initial_pointer: 0x00
        temperature_c: 25.0
        initial_registers:
          0x01: 0x00
          0x02: 0x4B
          0x03: 0x50
