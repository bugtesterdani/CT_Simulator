connectors:
  BoardPort:
    bgcolor: YE
    pins: [VPLUS, GND, IN, OUT]
    pinlabels: [VPLUS, GND, IN, OUT]

  R1:
    bgcolor: YE
    pins: [A, B]
    pinlabels: [A, B]

  DevicePort:
    bgcolor: YE
    pins: [INPUT, GND, OUTPUT, VPLUS]
    pinlabels: [INPUT, GND, OUTPUT, VPLUS]

cables:
  Versorgung:
    wirecount: 1
    show_wirecount: false
    show_wirenumbers: false
    color_code: DIN
    wirelabels: [VPLUS]

  Eingang:
    wirecount: 1
    show_wirecount: false
    show_wirenumbers: false
    color_code: DIN
    wirelabels: [IN]

  WiderstandZumDut:
    wirecount: 1
    show_wirecount: false
    show_wirenumbers: false
    color_code: DIN
    wirelabels: [SIG]

  Masse:
    wirecount: 1
    show_wirecount: false
    show_wirenumbers: false
    color_code: DIN
    wirelabels: [GND]

  Ausgang:
    wirecount: 1
    show_wirecount: false
    show_wirenumbers: false
    color_code: DIN
    wirelabels: [OUT]

connections:
  -
    - BoardPort: [VPLUS]
    - Versorgung: [VPLUS]
    - DevicePort: [VPLUS]
  -
    - BoardPort: [IN]
    - Eingang: [IN]
    - R1: [A]
  -
    - R1: [B]
    - WiderstandZumDut: [SIG]
    - DevicePort: [INPUT]
  -
    - BoardPort: [GND]
    - Masse: [GND]
    - DevicePort: [GND]
  -
    - BoardPort: [OUT]
    - Ausgang: [OUT]
    - DevicePort: [OUTPUT]
