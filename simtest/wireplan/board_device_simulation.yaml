elements:
  - id: K1
    type: relay
    coil:
      signal: VCC_Plus
      threshold_v: 10.0
    contacts:
      - a: K1.COM
        b: K1.NO
        mode: normally_open

  - id: R1
    type: resistor
    a: R1.A
    b: R1.B
    ohms: 1000

  - id: T1
    type: transformer
    primary_a: T1.P1
    primary_b: T1.P2
    secondary_a: T1.S1
    secondary_b: T1.S2
    ratio: 10.0

  - id: CT1
    type: current_transformer
    primary_signal: LOAD_CURRENT
    secondary_a: CT1.S1
    secondary_b: CT1.S2
    ratio: 2000
