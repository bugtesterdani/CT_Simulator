elements:
  - id: RELAIS
    type: relay
    coil:
      signal: UIF_OUT1
      threshold_v: 24.0
    delay_ms: 50
    contacts:
      - a: RELAIS.COM1
        b: RELAIS.NO1
        mode: normally_open

  - id: UIF_SUPPLY
    type: tester_supply
    signal: UIF_P_24V
    voltage: 24.0

  - id: UIF_OUT1_CONFIG
    type: tester_output
    signal: UIF_OUT1
    high_mode: supply
    high_supply: UIF_P_24V
    low_mode: open

  - id: Testsystem
    type: testsystem
    odbc_mode: real

  - id: DeviceBoard
    type: assembly
    wiring: board_device_wireviz.yaml
    simulation: board_device_simulation.yaml
    ports:
      VPLUS: BoardPort.VPLUS
      GND: BoardPort.GND
      IN: BoardPort.IN
      OUT: BoardPort.OUT
